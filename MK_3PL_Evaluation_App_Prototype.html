<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mary Kay · 3PL Evaluation Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #F5F2EC;
    --paper: #FBFAF6;
    --ink: #1A1A1A;
    --slate: #4A4A4A;
    --whisper: #8A8A8A;
    --hairline: #E6E1D7;
    --border: #D4CCBC;
    --rose: #E1306C;
    --rose-deep: #B91D54;
    --rose-pale: #FCE7EE;
    --navy: #1F3864;
    --navy-deep: #142849;
    --navy-pale: #E8ECF5;
    --emerald: #2F855A;
    --amber: #C05621;
    --crimson: #C53030;
    --gold: #B7791F;
    --shadow-sm: 0 1px 2px rgba(26,26,26,0.04), 0 1px 3px rgba(26,26,26,0.06);
    --shadow-md: 0 4px 6px -1px rgba(26,26,26,0.05), 0 2px 4px -2px rgba(26,26,26,0.04);
    --shadow-lg: 0 10px 25px -5px rgba(26,26,26,0.08), 0 8px 10px -6px rgba(26,26,26,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }
  h1, h2, h3, h4, .serif {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    letter-spacing: -0.015em;
    line-height: 1.15;
  }
  .display { font-family: 'Fraunces', Georgia, serif; font-weight: 400; letter-spacing: -0.025em; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

  /* ======== Header ======== */
  header.app-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(245, 242, 236, 0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--hairline);
  }
  .header-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand {
    display: flex; align-items: baseline; gap: 14px;
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500; font-size: 19px; letter-spacing: -0.01em;
  }
  .brand .mark {
    width: 28px; height: 28px;
    background: var(--rose);
    border-radius: 50%; display: inline-block;
    position: relative;
  }
  .brand .mark::after {
    content: ''; position: absolute; inset: 6px;
    border-radius: 50%; background: var(--cream);
  }
  .brand-text { font-style: italic; font-weight: 400; }
  .brand-divider { color: var(--whisper); font-style: normal; font-weight: 300; margin: 0 6px; }

  nav.app-nav { display: flex; gap: 28px; }
  nav.app-nav button {
    background: none; border: none;
    font-family: inherit; font-size: 14px; font-weight: 500;
    color: var(--slate); cursor: pointer;
    padding: 8px 0; position: relative;
    transition: color 200ms;
  }
  nav.app-nav button.active { color: var(--ink); }
  nav.app-nav button.active::after {
    content: ''; position: absolute;
    bottom: -2px; left: 0; right: 0; height: 1px;
    background: var(--rose);
  }
  nav.app-nav button:hover { color: var(--ink); }

  /* ======== Layout ======== */
  main { max-width: 1280px; margin: 0 auto; padding: 48px 32px; }
  section.pad-top { padding-top: 32px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .stack-lg { display: flex; flex-direction: column; gap: 32px; }
  .row { display: flex; gap: 16px; align-items: center; }
  .row-between { display: flex; justify-content: space-between; align-items: center; }
  .spacer { flex: 1; }
  @media (max-width: 880px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    main { padding: 32px 20px; }
    .header-inner { padding: 16px 20px; }
    nav.app-nav { gap: 16px; }
  }

  /* ======== Cards ======== */
  .card {
    background: var(--paper);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 28px;
  }
  .card-elevated {
    background: var(--paper);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 32px;
    box-shadow: var(--shadow-sm);
  }
  .card h3 { margin-bottom: 6px; font-size: 22px; }
  .card .eyebrow + h3 { margin-top: 4px; }

  /* ======== Typography utilities ======== */
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 11px;
    font-weight: 600;
    color: var(--whisper);
  }
  .lead {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 300;
    font-size: 22px;
    line-height: 1.45;
    color: var(--slate);
    letter-spacing: -0.01em;
  }
  .small { font-size: 13px; color: var(--slate); }
  .micro { font-size: 12px; color: var(--whisper); }
  .strong { color: var(--ink); font-weight: 600; }
  .italic { font-style: italic; }
  .center { text-align: center; }

  /* ======== Buttons ======== */
  button.btn {
    font-family: inherit; cursor: pointer;
    padding: 12px 22px; border-radius: 6px;
    font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
    border: 1px solid transparent;
    transition: all 180ms;
  }
  .btn-primary {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .btn-primary:hover { background: var(--navy-deep); border-color: var(--navy-deep); }
  .btn-rose {
    background: var(--rose); color: white; border-color: var(--rose);
  }
  .btn-rose:hover { background: var(--rose-deep); border-color: var(--rose-deep); }
  .btn-outline {
    background: transparent; color: var(--ink); border-color: var(--border);
  }
  .btn-outline:hover { background: var(--paper); border-color: var(--ink); }
  .btn-ghost {
    background: transparent; color: var(--slate); border: none;
    padding: 10px 14px;
  }
  .btn-ghost:hover { color: var(--ink); }
  .btn-large { padding: 16px 32px; font-size: 15px; }

  /* ======== Inputs ======== */
  label.field {
    display: flex; flex-direction: column; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--slate);
  }
  label.field .help { font-weight: 400; color: var(--whisper); font-size: 12px; }
  input.txt, select.sel, textarea.txt {
    font-family: inherit; font-size: 14px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--paper);
    color: var(--ink);
    transition: border 150ms, box-shadow 150ms;
  }
  input.txt:focus, select.sel:focus, textarea.txt:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,26,26,0.06);
  }
  textarea.txt { min-height: 80px; resize: vertical; line-height: 1.5; }

  /* ======== Score buttons (1-5 scale) ======== */
  .score-row {
    display: flex; gap: 6px;
  }
  .score-btn {
    width: 38px; height: 38px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--paper);
    font-family: inherit; font-size: 14px; font-weight: 600;
    color: var(--slate);
    cursor: pointer;
    transition: all 120ms;
  }
  .score-btn:hover { border-color: var(--ink); color: var(--ink); }
  .score-btn.selected {
    background: var(--ink); border-color: var(--ink); color: var(--paper);
  }
  .score-btn.selected.tier-good { background: var(--emerald); border-color: var(--emerald); }
  .score-btn.selected.tier-mid { background: var(--gold); border-color: var(--gold); }
  .score-btn.selected.tier-weak { background: var(--crimson); border-color: var(--crimson); }
  .score-btn:focus { outline: none; box-shadow: 0 0 0 3px rgba(26,26,26,0.1); }

  /* ======== Badges ======== */
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge-rose { background: var(--rose-pale); color: var(--rose-deep); }
  .badge-navy { background: var(--navy-pale); color: var(--navy); }
  .badge-emerald { background: #E6F4EC; color: var(--emerald); }
  .badge-amber { background: #FBE9D5; color: var(--amber); }
  .badge-crimson { background: #FBE5E5; color: var(--crimson); }
  .badge-grey { background: #ECECEC; color: var(--slate); }

  /* ======== Stepper ======== */
  .stepper {
    display: flex;
    gap: 0;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 16px;
  }
  .step {
    flex: 1; display: flex; flex-direction: column; gap: 4px;
    cursor: pointer;
    padding: 8px 12px;
    border-bottom: 2px solid transparent;
    margin-bottom: -17px;
    transition: border-color 200ms;
  }
  .step .step-num {
    font-size: 11px; font-weight: 600; color: var(--whisper);
    letter-spacing: 0.1em;
  }
  .step .step-label {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500; font-size: 16px; color: var(--slate);
    letter-spacing: -0.01em;
  }
  .step.active { border-bottom-color: var(--rose); }
  .step.active .step-num { color: var(--rose); }
  .step.active .step-label { color: var(--ink); }
  .step.completed .step-num::before { content: '✓ '; color: var(--emerald); }

  /* ======== Pillar collapsibles ======== */
  .pillar {
    border: 1px solid var(--hairline);
    border-radius: 10px;
    background: var(--paper);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .pillar-head {
    padding: 18px 22px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer;
    user-select: none;
    background: var(--paper);
  }
  .pillar-head:hover { background: var(--cream); }
  .pillar-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px; font-weight: 400;
    color: var(--rose);
    width: 36px;
    line-height: 1;
  }
  .pillar-name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 18px; font-weight: 500;
    color: var(--ink);
    flex: 1;
  }
  .pillar-weight {
    font-family: 'Manrope', sans-serif;
    font-size: 12px; font-weight: 700;
    color: var(--whisper);
    letter-spacing: 0.05em;
  }
  .pillar-avg {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px; font-weight: 700;
    background: var(--cream);
    color: var(--slate);
    min-width: 56px;
    text-align: center;
  }
  .pillar-avg.tier-good { background: #E6F4EC; color: var(--emerald); }
  .pillar-avg.tier-mid { background: #FBE9D5; color: var(--amber); }
  .pillar-avg.tier-weak { background: #FBE5E5; color: var(--crimson); }
  .pillar-toggle { color: var(--whisper); font-size: 18px; }
  .pillar-body {
    padding: 8px 22px 22px 74px;
    border-top: 1px solid var(--hairline);
    background: var(--cream);
  }
  .criterion {
    padding: 14px 0;
    border-bottom: 1px dashed var(--hairline);
  }
  .criterion:last-child { border-bottom: none; }
  .criterion-text {
    font-size: 14px; color: var(--ink);
    margin-bottom: 4px;
  }
  .criterion-help {
    font-size: 12px; color: var(--whisper);
    margin-bottom: 10px;
    font-style: italic;
  }

  /* ======== Result panels ======== */
  .verdict {
    padding: 40px;
    border-radius: 14px;
    margin-bottom: 28px;
    text-align: center;
    color: white;
  }
  .verdict.outsource { background: linear-gradient(135deg, var(--emerald), #1F5F3F); }
  .verdict.renegotiate { background: linear-gradient(135deg, var(--gold), #8B5A0F); }
  .verdict.stay { background: linear-gradient(135deg, var(--navy), var(--navy-deep)); }
  .verdict.escalate { background: linear-gradient(135deg, var(--crimson), #8B1F1F); }
  .verdict-eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 11px;
    opacity: 0.7;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .verdict-headline {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 38px;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    line-height: 1.1;
  }
  .verdict-sub {
    font-size: 16px;
    opacity: 0.85;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* ======== Tables / data grids ======== */
  .data-grid {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .data-grid th {
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--whisper);
    padding: 12px 16px;
    border-bottom: 1px solid var(--hairline);
  }
  .data-grid th.right { text-align: right; }
  .data-grid td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--hairline);
  }
  .data-grid td.right { text-align: right; font-variant-numeric: tabular-nums; }
  .data-grid tr:last-child td { border-bottom: none; }
  .data-grid tr.total td { font-weight: 700; background: var(--cream); }

  /* ======== Tabs ======== */
  .tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 24px;
  }
  .tab-btn {
    background: none; border: none;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 14px; font-weight: 500;
    color: var(--slate);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 150ms;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--rose);
  }

  /* ======== Hero / Home ======== */
  .hero {
    padding: 72px 0 64px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 56px;
  }
  .hero-eyebrow { color: var(--rose); }
  .hero h1 {
    font-size: clamp(40px, 5.5vw, 68px);
    font-weight: 300;
    letter-spacing: -0.03em;
    margin: 16px 0;
    max-width: 820px;
  }
  .hero h1 em { font-style: italic; color: var(--rose); font-weight: 400; }
  .hero p {
    max-width: 580px;
    color: var(--slate);
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* ======== Stats ======== */
  .stat {
    display: flex; flex-direction: column; gap: 4px;
    padding: 18px 0;
  }
  .stat-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 36px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--whisper);
    font-weight: 600;
  }

  /* ======== Saved evaluation cards ======== */
  .eval-card {
    background: var(--paper);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    padding: 22px 24px;
    cursor: pointer;
    transition: all 200ms;
  }
  .eval-card:hover {
    border-color: var(--ink);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .eval-card-title {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500; font-size: 18px;
    color: var(--ink); margin-bottom: 6px;
  }
  .eval-card-meta {
    font-size: 12px; color: var(--whisper);
    display: flex; gap: 12px;
    margin-bottom: 12px;
  }

  /* ======== Supplier portal styling ======== */
  .supplier-banner {
    background: var(--navy);
    color: var(--paper);
    padding: 32px;
    border-radius: 12px;
    margin-bottom: 32px;
  }
  .supplier-banner .eyebrow { color: rgba(255,255,255,0.5); }
  .supplier-banner h2 { color: white; font-size: 26px; margin: 6px 0 8px; }
  .supplier-banner p { opacity: 0.85; max-width: 600px; }

  /* ======== Readiness gauge ======== */
  .gauge {
    position: relative;
    width: 240px; height: 140px;
    margin: 16px auto;
  }
  .gauge svg { width: 100%; height: 100%; }
  .gauge-value {
    position: absolute;
    top: 60%; left: 50%;
    transform: translate(-50%, -40%);
    text-align: center;
  }
  .gauge-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 44px;
    font-weight: 500;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .gauge-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--whisper);
    font-weight: 600;
    margin-top: 4px;
  }

  /* ======== Print styles ======== */
  @media print {
    header.app-header, nav.app-nav, .no-print { display: none !important; }
    body { background: white; color: black; }
    .card, .card-elevated { border: 1px solid #ccc; box-shadow: none; }
    main { padding: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ============================================================
// FRAMEWORK DEFINITIONS
// ============================================================

  {

    ],
    readiness: {},

      internal: 0,
      v1: 0, v2: 0, v3: 0,
    },
    scores: {
      v1: {}, v2: {}, v3: {}, internal: {},
    },
  };
}

function tierForScore(score) {
  if (score >= 4.0) return 'good';
  if (score >= 3.0) return 'mid';
  if (score > 0) return 'weak';
  return null;
}

function tierForReadiness(idx) {
  if (idx >= 70) return 'good';
  if (idx >= 40) return 'mid';
  return 'weak';
}

function readinessLabel(idx) {
  if (idx >= 80) return 'Strong — internal operation healthy';
  if (idx >= 60) return 'Adequate — minor pressures';
  if (idx >= 40) return 'Mixed — meaningful internal pressures';
  if (idx >= 20) return 'Weak — substantial internal challenges';
  return 'Distressed — operation under serious strain';
}

function calculateReadinessIndex(readiness) {
  const allScores = [];
  READINESS_DIMENSIONS.forEach((dim) => {
    dim.questions.forEach((q) => {
      const v = readiness?.[dim.id]?.[q.id];
      if (v && v > 0) allScores.push(v);
    });
  });
  if (allScores.length === 0) return null;
  const avg = allScores.reduce((a, b) => a + b, 0) / allScores.length;
  return Math.round(avg * 20);
}

function calculatePillarAverage(scores, pillarId) {
  const pillar = PILLARS.find((p) => p.id === pillarId);
  if (!pillar) return 0;
  const vals = pillar.criteria.map((c) => scores?.[c.id]).filter((v) => v && v > 0);
  if (vals.length === 0) return 0;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

function calculateTotalScore(scores) {
  let total = 0;
  PILLARS.forEach((pillar) => {
    total += calculatePillarAverage(scores, pillar.id) * pillar.weight;
  });
  return total;
}

function calculateVariance(internal, vendor) {
  if (!internal || internal === 0) return null;
  return (vendor - internal) / internal;
}

function generateRecommendation(evalu) {
  const { costs, scores, readiness } = evalu;
  const readinessIdx = calculateReadinessIndex(readiness);

  // Compute scores
  const v1Total = calculateTotalScore(scores.v1);
  const v2Total = calculateTotalScore(scores.v2);
  const v3Total = calculateTotalScore(scores.v3);
  const vendorScores = [
    { id: 'v1', name: evalu.vendors[0]?.name || 'Vendor 1', score: v1Total, cost: costs.v1, var: calculateVariance(costs.internal, costs.v1) },
    { id: 'v2', name: evalu.vendors[1]?.name || 'Vendor 2', score: v2Total, cost: costs.v2, var: calculateVariance(costs.internal, costs.v2) },
    { id: 'v3', name: evalu.vendors[2]?.name || 'Vendor 3', score: v3Total, cost: costs.v3, var: calculateVariance(costs.internal, costs.v3) },
  ].filter((v) => v.cost > 0 && v.score > 0);

  if (vendorScores.length === 0) {
    return { status: 'incomplete', message: 'Complete vendor scoring and cost data to generate a recommendation.' };
  }

  // Best vendor by score
  const best = vendorScores.reduce((a, b) => (b.score > a.score ? b : a));

  // Threshold modifier from internal readiness
  let costThreshold = 0.15;
  let readinessNote = 'Standard 15% cost gap threshold.';
  if (readinessIdx !== null) {
    if (readinessIdx < 40) {
      costThreshold = 0.25;
      readinessNote = `Internal readiness is weak (${readinessIdx}/100). Cost gap threshold relaxed to 25% — favor outsource even at higher vendor cost.`;
    } else if (readinessIdx > 70) {
      costThreshold = 0.05;
      readinessNote = `Internal readiness is strong (${readinessIdx}/100). Cost gap threshold tightened to 5% — require meaningful vendor savings to justify outsource.`;
    } else {
      readinessNote = `Internal readiness is mixed (${readinessIdx}/100). Standard 15% cost gap threshold applies.`;
    }
  }

  // Decision tree
  const v = best.var;
  const s = best.score;
  let status, headline, sub;

  if (v <= 0 && s >= 3.5) {
    status = 'outsource';
    headline = `Outsource to ${best.name}`;
    sub = `Vendor cost is at or below internal (${(v * 100).toFixed(1)}%) and qualitative score is ${s.toFixed(2)}/5. Prepare SMA for Region Team review and Region President approval.`;
  } else if (v <= costThreshold && s >= 4.0) {
    status = 'renegotiate';
    headline = `Re-negotiate with ${best.name}`;
    sub = `Score is strong (${s.toFixed(2)}/5) but cost gap is ${(v * 100).toFixed(1)}%. Request a second-round optimization round before deciding.`;
  } else if (v <= costThreshold) {
    status = 'stay';
    headline = 'Stay In-House';
    sub = `Vendor cost gap (${(v * 100).toFixed(1)}%) is within tolerance but qualitative score (${s.toFixed(2)}/5) is not strong enough. Explore in-house optimization first.`;
  } else {
    status = 'escalate';
    headline = 'Stay In-House — Escalate';
    sub = `Vendor cost gap (${(v * 100).toFixed(1)}%) exceeds the ${(costThreshold * 100).toFixed(0)}% threshold. Escalate to Region; investigate operational improvements internally.`;
  }

  return { status, headline, sub, best, vendorScores, readinessIdx, readinessNote, costThreshold };
}

// Storage layer with three-tier fallback:
// 1. window.storage (Claude.ai artifact runtime)
// 2. localStorage (standalone HTML in any browser — the typical hosted scenario)
// 3. In-memory Map (last resort if both fail)
const _memoryStore = new Map();
const _hasArtifactStorage = typeof window !== 'undefined' && window.storage && typeof window.storage.set === 'function';
const _hasLocalStorage = (() => {
  try {
    if (typeof localStorage === 'undefined') return false;
    const probe = '__mk_probe__';
    localStorage.setItem(probe, '1');
    localStorage.removeItem(probe);
    return true;
  } catch (e) { return false; }
})();

const Storage = {
  async listEvals() {
    const evals = [];
    if (_hasArtifactStorage) {
      try {
        const result = await window.storage.list('eval:');
        if (result && result.keys) {
          for (const key of result.keys) {
            try {
              const e = await window.storage.get(key);
              if (e && e.value) evals.push(typeof e.value === 'string' ? JSON.parse(e.value) : e.value);
            } catch (err) { /* skip */ }
          }
        }
      } catch (e) { /* fall through */ }
    } else if (_hasLocalStorage) {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('eval:')) {
          try { evals.push(JSON.parse(localStorage.getItem(k))); }
          catch (e) { /* skip */ }
        }
      }
    } else {
      for (const [k, v] of _memoryStore.entries()) {
        if (k.startsWith('eval:')) evals.push(v);
      }
    }
    return evals.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  },
  async getEval(id) {
    const key = `eval:${id}`;
    if (_hasArtifactStorage) {
      try {
        const result = await window.storage.get(key);
        if (result && result.value) return typeof result.value === 'string' ? JSON.parse(result.value) : result.value;
      } catch (e) { /* fall through */ }
    } else if (_hasLocalStorage) {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    }
    return _memoryStore.get(key) || null;
  },
  async saveEval(evalu) {
    evalu.updatedAt = new Date().toISOString();
    const key = `eval:${evalu.id}`;
    const json = JSON.stringify(evalu);
    if (_hasArtifactStorage) {
      try { await window.storage.set(key, json); return true; }
      catch (e) { /* fall through */ }
    }
    if (_hasLocalStorage) {
      try { localStorage.setItem(key, json); return true; }
      catch (e) { /* fall through */ }
    }
    _memoryStore.set(key, evalu);
    return true;
  },
  async deleteEval(id) {
    const key = `eval:${id}`;
    if (_hasArtifactStorage) {
      try { await window.storage.delete(key); }
      catch (e) { /* fall through */ }
    }
    if (_hasLocalStorage) localStorage.removeItem(key);
    _memoryStore.delete(key);
    return true;
  },
  // Diagnostic - lets the UI show which storage tier is active
  mode() {
    if (_hasArtifactStorage) return 'artifact';
    if (_hasLocalStorage) return 'localStorage';
    return 'memory';
  },
};

  const tier = index !== null ? tierForReadiness(index) : null;

  return (
    <div className="gauge">
      <svg viewBox="0 0 240 140">
        {/* Background arc */}
        <path d="M 20 120 A 100 100 0 0 1 220 120" stroke="var(--hairline)" strokeWidth="14" fill="none" strokeLinecap="round" />
        {/* Foreground arc */}
        {index !== null && (
          <path
            d="M 20 120 A 100 100 0 0 1 220 120"
            stroke={color}
            strokeWidth="14"
            fill="none"
            strokeLinecap="round"
            strokeDasharray={`${(angle / 180) * 314} 314`}
            style={{ transition: 'stroke-dasharray 600ms ease-out' }}

      </div>
    </div>
  );
}

function StepReadiness({ data, update, onNext, onBack }) {
  const setReadiness = (dimId, qId, val) => {
    const r = { ...(data.readiness || {}) };
    r[dimId] = { ...(r[dimId] || {}), [qId]: val };
    update({ ...data, readiness: r });
  };

  const idx = calculateReadinessIndex(data.readiness);
  const tier = idx !== null ? tierForReadiness(idx) : null;

  return (
    <div className="stack-lg">
      <div>
        <span className="eyebrow">Step two — new this version</span>
        <h2 style={{ fontSize: 32, marginTop: 8 }}>Internal readiness assessment</h2>
        <p className="small" style={{ maxWidth: 720, marginTop: 8 }}>
          The vendor scorecard answers <em>"is this vendor good?"</em> — but the outsource decision
          also depends on <em>"is our internal operation viable to maintain?"</em>. Score 18 questions
          across six dimensions. Your readiness index will <strong>dynamically adjust the cost-gap
          threshold</strong> in the final recommendation.
        </p>
      </div>

      <div className="card-elevated" style={{ background: 'var(--cream)' }}>
        <div className="row" style={{ gap: 32, alignItems: 'center' }}>
          <ReadinessGauge index={idx} />
          <div style={{ flex: 1 }}>
            <span className="eyebrow">Internal readiness index</span>
            <h3 style={{ fontSize: 22, marginTop: 8, marginBottom: 8 }}>
              {idx !== null ? readinessLabel(idx) : 'Score the questions below to compute your index'}
            </h3>
            <p className="small">
              <strong>Index &lt; 40</strong> — relax cost-gap threshold to 25% (weak internal favors outsource)<br />
              <strong>Index 40–70</strong> — standard 15% threshold applies<br />
              <strong>Index &gt; 70</strong> — tighten threshold to 5% (strong internal requires real savings)
            </p>
          </div>
        </div>
      </div>

      <div className="stack">
        {READINESS_DIMENSIONS.map((dim) => {
          const dimScores = dim.questions
            .map((q) => data.readiness?.[dim.id]?.[q.id])
            .filter((v) => v && v > 0);
          const dimAvg = dimScores.length ? (dimScores.reduce((a, b) => a + b, 0) / dimScores.length) : 0;
          return (
            <div key={dim.id} className="card-elevated">
              <div className="row" style={{ marginBottom: 4 }}>
                <span style={{ fontSize: 20 }}>{dim.icon}</span>
                <h3 style={{ fontSize: 18, flex: 1 }}>{dim.name}</h3>
                {dimAvg > 0 && (
                  <span className={`badge ${dimAvg >= 4 ? 'badge-emerald' : dimAvg >= 3 ? 'badge-amber' : 'badge-crimson'}`}>
                    {dimAvg.toFixed(1)}/5
                  </span>
                )}
              </div>
              <p className="small italic" style={{ marginBottom: 16, color: 'var(--whisper)' }}>{dim.description}</p>
              <div className="stack" style={{ gap: 18 }}>
                {dim.questions.map((q) => {
                  const val = data.readiness?.[dim.id]?.[q.id] || 0;
                  return (
                    <div key={q.id}>
                      <div className="criterion-text">{q.text}</div>
                      <div style={{ marginTop: 8 }}>
                        <ScoreRow
                          value={val}
                          onChange={(v) => setReadiness(dim.id, q.id, v)}
                          anchors={q.anchors}
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      <div className="row-between">
        <button className="btn btn-ghost" onClick={onBack}>← Back to setup</button>
        <button className="btn btn-primary" onClick={onNext}>Continue to vendors →</button>
      </div>
    </div>
  );
}

// WIZARD: SCORING
// ============================================================

function StepScoring({ data, update, onNext, onBack }) {
  const [activeVendor, setActiveVendor] = useState('v1');
  const [openPillars, setOpenPillars] = useState({ investigation: true });
  const setScore = (vendor, criterionId, value) => {
    const s = { ...data.scores };
    s[vendor] = { ...(s[vendor] || {}), [criterionId]: value };
    update({ ...data, scores: s });
  };

  const variance = data.costs.internal > 0
    ? calculateVariance(data.costs.internal, data.costs[activeVendor])
    : null;

  // Auto-set the cost criterion based on variance
  useEffect(() => {
    if (variance === null) return;
    let costScore = 1;
    if (variance <= -0.10) costScore = 5;
    else if (variance <= 0) costScore = 4;
    else if (variance <= 0.05) costScore = 3;
    else if (variance <= 0.15) costScore = 2;
    if (data.scores[activeVendor]?.tco !== costScore) {
      setScore(activeVendor, 'tco', costScore);
    }
  }, [variance, activeVendor]);

  const totalScore = calculateTotalScore(data.scores[activeVendor] || {});
  const totalTier = tierForScore(totalScore);

  return (
    <div className="stack-lg">
      <div>
        <span className="eyebrow">Step four</span>
        <h2 style={{ fontSize: 32, marginTop: 8 }}>Vendor scoring</h2>
        <p className="small" style={{ maxWidth: 720, marginTop: 8 }}>
          Score each vendor on the 8-pillar Enhanced framework. Use 1–5: 5 = Leading, 4 = Strong,
          3 = Mid, 2 = Weak, 1 = Lagging. The Commercial Plan cost criterion auto-calculates from the
          variance you entered.
        </p>
      </div>

      <div className="tabs">
        {data.vendors.map((v) => (
          <button key={v.id}
                  className={`tab-btn ${activeVendor === v.id ? 'active' : ''}`}
                  onClick={() => setActiveVendor(v.id)}>
            {v.name || `Vendor ${v.id.slice(1)}`}
          </button>
        ))}
        <button className={`tab-btn ${activeVendor === 'internal' ? 'active' : ''}`}
                onClick={() => setActiveVendor('internal')}>
          Internal (current state)
        </button>
      </div>

      <div className="card-elevated" style={{ background: 'var(--cream)', padding: 20 }}>
        <div className="row-between">
          <div>
            <span className="eyebrow">Total weighted score</span>
            <h3 style={{ fontSize: 28, marginTop: 4 }}>
              {totalScore > 0 ? totalScore.toFixed(2) : '—'}
              <span style={{ fontSize: 16, color: 'var(--whisper)', fontWeight: 400 }}> / 5.00</span>
            </h3>
          </div>
          {totalScore > 0 && (
            <span className={`badge ${totalTier === 'good' ? 'badge-emerald' : totalTier === 'mid' ? 'badge-amber' : 'badge-crimson'}`}
                  style={{ fontSize: 12, padding: '6px 12px' }}>
              {totalTier === 'good' ? 'Strong' : totalTier === 'mid' ? 'Moderate' : 'Weak'}
            </span>
          )}
        </div>
      </div>

      <div>
        {PILLARS.map((pillar) => {
          const open = openPillars[pillar.id];
          const avg = calculatePillarAverage(data.scores[activeVendor] || {}, pillar.id);
          const tier = tierForScore(avg);
          return (
            <div key={pillar.id} className="pillar">
              <div className="pillar-head" onClick={() => setOpenPillars({ ...openPillars, [pillar.id]: !open })}>
                <div className="pillar-num">{pillar.num}</div>
                <div className="pillar-name">{pillar.name}</div>
                <div className="pillar-weight">{(pillar.weight * 100).toFixed(0)}%</div>
                <div className={`pillar-avg ${tier ? `tier-${tier}` : ''}`}>
                  {avg > 0 ? avg.toFixed(2) : '—'}
                </div>
                <div className="pillar-toggle">{open ? '−' : '+'}</div>
              </div>
              {open && (
                <div className="pillar-body">
                  {pillar.criteria.map((c) => (
                    <div key={c.id} className="criterion">
                      <div className="criterion-text">
                        {c.text}
                        {c.auto && <span className="badge badge-grey" style={{ marginLeft: 8, fontSize: 10 }}>Auto-calculated</span>}
                      </div>
                      <div className="criterion-help">{c.help}</div>
                      <ScoreRow
                        value={data.scores[activeVendor]?.[c.id] || 0}
                        onChange={(v) => !c.auto && setScore(activeVendor, c.id, v)}
                      />
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="row-between">
        <button className="btn btn-ghost" onClick={onBack}>← Back to costs</button>
        <button className="btn btn-primary" onClick={onNext}>Generate recommendation →</button>
      </div>
    </div>
  );
}

// ============================================================

function Wizard({ initial, onSave, onExit, onHome }) {
  const [data, setData] = useState(initial);
  const [step, setStep] = useState(0);

  const steps = ['Setup', 'Internal readiness', 'Costs', 'Scoring', 'Recommendation'];

  const update = useCallback((d) => {
    setData(d);
    onSave(d, false);
  }, [onSave]);

  const onSaveAndPersist = () => onSave(data, true);

  return (
    <div>
      <div className="row-between" style={{ marginBottom: 20 }}>
        <button className="btn btn-ghost" onClick={onExit}>← All evaluations</button>
        <span className="micro">{data.setup.projectName || 'Untitled evaluation'}</span>
      </div>

      <div className="stepper">
        {steps.map((label, i) => (
          <div key={i}
               className={`step ${i === step ? 'active' : ''} ${i < step ? 'completed' : ''}`}
               onClick={() => setStep(i)}>
            <div className="step-num">Step {i + 1}</div>
            <div className="step-label">{label}</div>
          </div>
        ))}
      </div>

      {step === 0 && <StepSetup data={data} update={update} onNext={() => setStep(1)} />}
      {step === 1 && <StepReadiness data={data} update={update} onNext={() => setStep(2)} onBack={() => setStep(0)} />}
      {step === 2 && <StepCosts data={data} update={update} onNext={() => setStep(3)} onBack={() => setStep(1)} />}
      {step === 3 && <StepScoring data={data} update={update} onNext={() => setStep(4)} onBack={() => setStep(2)} />}
      {step === 4 && <StepRecommendation data={data} update={update} onBack={() => setStep(3)}
                                          onSave={onSaveAndPersist} onHome={onHome} />}
    </div>
  );
}

                  <div className="row-between">
                    <div>
                      <div className="strong" style={{ fontSize: 16 }}>{e.setup.projectName || 'Untitled'}</div>
                      <div className="micro" style={{ marginTop: 4 }}>{e.setup.region} · {e.setup.country}</div>
                    </div>
                    <span className="badge badge-rose">Open</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{ marginTop: 24 }}>
          <button className="btn btn-ghost" onClick={onExit}>← Return to home</button>
        </div>
      </div>
    );
  }

  const vendor = selectedEval.vendors[vendorIdx];

  return (
    <div>
      <div className="supplier-banner">
        <span className="eyebrow">Mary Kay supplier portal — {selectedEval.setup.country}</span>
        <h2>{selectedEval.setup.projectName}</h2>
        <p>Submitting as: <strong>{vendor.name || `Vendor ${vendorIdx + 1}`}</strong></p>
      </div>

      <div className="row" style={{ marginBottom: 20 }}>
        <span className="micro">In production, this access link would be specific to your vendor record. For demo purposes, switch slots:</span>
      </div>
      <div className="tabs">
        {selectedEval.vendors.map((v, i) => (
          <button key={v.id}
                  className={`tab-btn ${vendorIdx === i ? 'active' : ''}`}
                  onClick={() => setVendorIdx(i)}>
            {v.name || `Vendor slot ${i + 1}`}
          </button>
        ))}
      </div>

      <div className="card-elevated">
        <h3 style={{ fontSize: 18, marginBottom: 16 }}>Project information</h3>
        <div className="grid-2">
          <div>
            <div className="micro">Project</div>
            <div className="strong">{selectedEval.setup.projectName}</div>
          </div>
          <div>
            <div className="micro">Market</div>
            <div className="strong">{selectedEval.setup.country} ({selectedEval.setup.region})</div>
          </div>
          <div>
            <div className="micro">Reporting currency</div>
            <div className="strong">{selectedEval.setup.currency}</div>
          </div>
          <div>
            <div className="micro">Target go-live</div>
            <div className="strong">{selectedEval.setup.golive || 'TBD'}</div>
          </div>
        </div>
      </div>

      <div className="card-elevated" style={{ marginTop: 24 }}>
        <h3 style={{ fontSize: 18, marginBottom: 16 }}>Your proposal</h3>
        <p className="small" style={{ marginBottom: 24 }}>
          Mary Kay's evaluation team will use this information alongside your detailed RFQ rate card
          (sent separately as Excel) to score your proposal across the 8-pillar framework. Save your
          progress and submit when ready.
        </p>
        <div className="stack">
          <div className="grid-2">
            <label className="field">
              Primary contact name
              <input className="txt" value={submission.contact}
                     onChange={(e) => setSubmission({...submission, contact: e.target.value})} />
            </label>
            <label className="field">
              Contact email
              <input className="txt" type="email" value={submission.email}
                     onChange={(e) => setSubmission({...submission, email: e.target.value})} />
            </label>
            <label className="field">
              Phone
              <input className="txt" value={submission.phone}
                     onChange={(e) => setSubmission({...submission, phone: e.target.value})} />
            </label>
            <label className="field">
              Proposed total annual cost ({selectedEval.setup.currency})
              <input className="txt num" type="number" value={submission.proposedAnnualCost}
                     onChange={(e) => setSubmission({...submission, proposedAnnualCost: e.target.value})} />
            </label>
          </div>
          <label className="field">
            Proposed warehouse footprint
            <span className="help">e.g., "326 sqm picking area + 1,148 pallet positions, with separate cold storage"</span>
            <input className="txt" value={submission.proposedFootprint}
                   onChange={(e) => setSubmission({...submission, proposedFootprint: e.target.value})} />
          </label>
          <label className="field">
            Picking methodology and personnel model
            <span className="help">Describe wave/zone/batch picking approach, staff/temp ratio, peak season handling</span>
            <textarea className="txt" rows="3" value={submission.pickingMethodology}
                      onChange={(e) => setSubmission({...submission, pickingMethodology: e.target.value})} />
          </label>
          <label className="field">
            Automation deployment
            <span className="help">ASRS, robotics, AI routing, mobile scanning, dimensional weighing, etc.</span>
            <textarea className="txt" rows="3" value={submission.automation}
                      onChange={(e) => setSubmission({...submission, automation: e.target.value})} />
          </label>
          <label className="field">
            Quality compliance certifications
            <span className="help">ISO 9001, NPRA, GDP, HACCP, FDA, ANVISA, regional. Include audit dates if available.</span>
            <textarea className="txt" rows="3" value={submission.certifications}
                      onChange={(e) => setSubmission({...submission, certifications: e.target.value})} />
          </label>
          <label className="field">
            Cybersecurity certifications and data handling
            <span className="help">SOC 2 Type II, ISO 27001, data residency, breach response track record</span>
            <textarea className="txt" rows="3" value={submission.cybersecurity}
                      onChange={(e) => setSubmission({...submission, cybersecurity: e.target.value})} />
          </label>
          <label className="field">
            Customer references (3-5 minimum)
            <span className="help">Similar volume / vertical preferred. Include company name, your contact, contract years.</span>
            <textarea className="txt" rows="4" value={submission.references}
                      onChange={(e) => setSubmission({...submission, references: e.target.value})} />
          </label>
          <label className="field">
            ESG / sustainability practices
            <span className="help">Carbon reporting (Scope 1/2/3), packaging waste reduction, reverse logistics, EcoVadis or similar ratings</span>
            <textarea className="txt" rows="3" value={submission.sustainability}
                      onChange={(e) => setSubmission({...submission, sustainability: e.target.value})} />
          </label>
          <label className="field">
            Anything else Mary Kay should know about your proposal
            <textarea className="txt" rows="4" value={submission.narrative}
                      onChange={(e) => setSubmission({...submission, narrative: e.target.value})} />
          </label>
        </div>
        <div className="row" style={{ marginTop: 24 }}>
          <button className="btn btn-outline">Save draft</button>
          <button className="btn btn-rose">Submit proposal</button>
        </div>
        <p className="micro italic" style={{ marginTop: 16 }}>
          Demo note: in production, "Submit" would write your proposal to Mary Kay's secure backend
          and notify the evaluation team. For this prototype, no data is transmitted.
        </p>
      </div>

      <div style={{ marginTop: 24 }}>
        <button className="btn btn-ghost" onClick={() => setSelectedEval(null)}>← Choose a different evaluation</button>
        <button className="btn btn-ghost" onClick={onExit} style={{ marginLeft: 12 }}>← Return to MK home</button>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [view, setView] = useState('home');
  const [currentEval, setCurrentEval] = useState(null);
  const [evals, setEvals] = useState([]);
  const [storageReady, setStorageReady] = useState(false);

  const refreshEvals = useCallback(async () => {
    const list = await Storage.listEvals();
    setEvals(list);
    setStorageReady(true);
  }, []);

  useEffect(() => {
    refreshEvals();
  }, [refreshEvals]);

  const onNew = async () => {
    const fresh = emptyEvaluation();
    await Storage.saveEval(fresh);
    setCurrentEval(fresh);
    setView('wizard');
    refreshEvals();
  };

  const onOpen = async (id) => {
    const e = await Storage.getEval(id);
    if (e) {
      setCurrentEval(e);
      setView('wizard');
    }
  };

  const onSaveDuringWizard = async (data, persistAndRefresh) => {
    setCurrentEval(data);
    await Storage.saveEval(data);
    if (persistAndRefresh) refreshEvals();
  };

  const onDelete = async (id) => {
    if (window.confirm('Delete this evaluation? This cannot be undone.')) {
      await Storage.deleteEval(id);
      refreshEvals();
    }
  };

  const onHome = () => {
    setView('home');
    setCurrentEval(null);
    refreshEvals();
  };

  return (
    <>
      <header className="app-header">
        <div className="header-inner">
          <div className="brand">
            <span className="mark"></span>
            <span className="brand-text">Mary Kay</span>
            <span className="brand-divider">·</span>
            <span>3PL Evaluation Framework</span>
          </div>
          <nav className="app-nav">
            <button className={view === 'home' ? 'active' : ''} onClick={onHome}>Home</button>
            <button className={view === 'supplier' ? 'active' : ''} onClick={() => setView('supplier')}>Supplier portal</button>
            <button onClick={() => window.print()}>Print</button>
          </nav>
        </div>
      </header>
      <main>
        {view === 'home' && <Home evals={evals} onNew={onNew} onOpen={onOpen} onSupplier={() => setView('supplier')} onDelete={onDelete} />}
        {view === 'wizard' && currentEval && (
          <Wizard initial={currentEval}
                  onSave={onSaveDuringWizard}
                  onExit={onHome}
                  onHome={onHome} />
        )}
        {view === 'supplier' && <SupplierPortal evals={evals} onExit={onHome} />}
      </main>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
